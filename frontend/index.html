<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>学生信息管理系统</h1>
            <p class="subtitle">基于 openGauss/GaussDB + FastAPI + Docker</p>
        </header>

        <!-- 操作栏：搜索 + 新增 -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索姓名、专业或班级...">
                <button id="searchBtn">搜索</button>
            </div>
            <button id="addBtn" class="btn-primary">+ 新增学生</button>
        </div>

        <!-- 学生列表表格 -->
        <div class="table-wrapper">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>年龄</th>
                        <th>专业</th>
                        <th>班级</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="10">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 新增/编辑学生的模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">新增学生</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label for="name">姓名 <span class="required">*</span></label>
                    <input type="text" id="name" required maxlength="50" placeholder="请输入姓名">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender">
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="age">年龄</label>
                        <input type="number" id="age" min="10" max="50" value="20">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="major">专业</label>
                        <input type="text" id="major" maxlength="100" placeholder="请输入专业">
                    </div>
                    <div class="form-group">
                        <label for="className">班级</label>
                        <input type="text" id="className" maxlength="100" placeholder="请输入班级">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="text" id="phone" maxlength="20" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" maxlength="100" placeholder="请输入邮箱">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div class="modal-overlay" id="confirmOverlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <h3>确认删除</h3>
            </div>
            <p class="confirm-text">确定要删除学生 "<span id="deleteName"></span>" 吗？此操作不可撤销。</p>
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="confirmCancel">取消</button>
                <button type="button" class="btn-danger" id="confirmDelete">确认删除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
